<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>itsColl — Order Entry</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8EC;
    --surface: #FFFFFF;
    --surface2: #FFF3E0;
    --border: #E8D5B0;
    --border-focus: #F5A800;
    --text: #3D2B1F;
    --muted: #A07850;
    --accent: #F5A800;
    --accent2: #E09600;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f97316;
    --brand-fg: #3B82F6;
    --brand-omy: #8B5A2B;
    --brand-osg: #C49A6C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.08em;
  }
  .header-sep { color: var(--border); font-size: 20px; }
  .header-title { font-size: 14px; color: var(--muted); }

  /* ── Layout ── */
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Brand Picker ── */
  .brand-section {
    margin-bottom: 32px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .brand-tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .brand-tab {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .brand-tab:hover { border-color: var(--muted); }
  .brand-tab.active-fg { border-color: #3B82F6; background: rgba(59,130,246,0.08); }
  .brand-tab.active-omy { border-color: #8B5A2B; background: rgba(139,90,43,0.08); }
  .brand-tab.active-osg { border-color: #C49A6C; background: rgba(196,154,108,0.08); }
  .brand-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin: 0 auto 8px;
  }
  .dot-fg  { background: #3B82F6; }
  .dot-omy { background: #8B5A2B; }
  .dot-osg { background: #C49A6C; }
  .brand-tab span {
    font-size: 13px;
    font-weight: 500;
    display: block;
  }
  .brand-tab small {
    font-size: 11px;
    color: var(--muted);
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    border-radius: 2px;
    background: var(--accent);
  }
  .card-title.green::before { background: var(--brand-omy); }
  .card-title.orange::before { background: var(--brand-osg); }

  /* ── Form Fields ── */
  .field-grid {
    display: grid;
    gap: 14px;
  }
  .field-grid.col2 { grid-template-columns: 1fr 1fr; }
  .field-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
  }
  .field label .req { color: var(--red); margin-left: 2px; }

  .field input,
  .field select,
  .field textarea {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    transition: border-color 0.2s;
    outline: none;
    width: 100%;
  }
  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: var(--border-focus);
    background: #FFFDF5;
  }
  .field input::placeholder,
  .field textarea::placeholder { color: #3a3a50; }
  .field select option { background: #FFFFFF; }
  .field textarea { resize: vertical; min-height: 72px; }

  /* qty input */
  .qty-field {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .qty-field input {
    text-align: center;
    border-radius: 0;
    border-left: none;
    border-right: none;
    width: 60px;
    flex-shrink: 0;
  }
  .qty-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-size: 18px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }
  .qty-btn:first-child { border-radius: 8px 0 0 8px; }
  .qty-btn:last-child  { border-radius: 0 8px 8px 0; }
  .qty-btn:hover { background: var(--border); }

  /* ── Attachment ── */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: var(--surface2);
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--border-focus);
    background: rgba(91,91,246,0.05);
  }
  .upload-zone input[type=file] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }
  .upload-icon { font-size: 28px; margin-bottom: 8px; }
  .upload-text { font-size: 13px; color: var(--muted); }
  .upload-hint { font-size: 11px; color: #3a3a50; margin-top: 4px; }

  .file-preview {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1.5px solid var(--border-focus);
    border-radius: 8px;
    padding: 10px 14px;
    margin-top: 10px;
  }
  .file-preview.show { display: flex; }
  .file-icon { font-size: 20px; }
  .file-name { font-size: 13px; color: var(--text); flex: 1; word-break: break-all; }
  .file-size { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .file-remove {
    color: var(--muted); cursor: pointer; font-size: 16px;
    transition: color 0.15s;
  }
  .file-remove:hover { color: var(--red); }

  /* ── Submit ── */
  .submit-area {
    margin-top: 24px;
  }
  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: #3D2B1F;
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.02em;
  }
  .btn-submit:hover { background: #4a4adc; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled {
    opacity: 0.5; cursor: not-allowed; transform: none;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 22px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transition: transform 0.3s ease;
    z-index: 999;
    min-width: 240px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.error   { border-color: var(--red); }
  .toast-icon { font-size: 18px; }

  /* ── Progress ── */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
    display: none;
  }
  .progress-bar.show { display: block; }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    border-radius: 2px;
  }

  /* ── Section visibility ── */
  .brand-section-content { display: none; }
  .brand-section-content.visible { display: block; }


  /* ── Customer Search ── */
  .search-wrap { position: relative; }
  .search-input-row {
    display: flex; gap: 8px; align-items: center;
  }
  .search-input-row input { flex: 1; }
  .search-toggle {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 11px;
    padding: 0 10px;
    height: 36px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .search-toggle:hover { border-color: var(--border-focus); color: var(--text); }
  .search-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1.5px solid var(--border-focus);
    border-radius: 10px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }
  .search-dropdown.show { display: block; }
  .search-item {
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: var(--surface2); }
  .search-item-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .search-item-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .search-hint { font-size: 11px; color: var(--muted); padding: 10px 14px; }
  .search-loading { font-size: 11px; color: var(--muted); padding: 10px 14px; }
  @media (max-width: 520px) {
    .field-grid.col2 { grid-template-columns: 1fr; }
    .field-grid.col3 { grid-template-columns: 1fr 1fr; }
    .header { padding: 14px 18px; }
    .container { padding: 24px 16px 80px; }
  }
</style>
</head>

  <div class="header-sep" style="color:var(--border)">·</div>
  <div class="header-title">Order Entry Form</div>
</div>

<div class="container">

  <!-- Brand Picker -->
  <div class="brand-section">
    <div class="section-label">Select Brand</div>
    <div class="brand-tabs">
      <div class="brand-tab" data-brand="FlexiGlo" onclick="selectBrand('FlexiGlo', this)">
        <div class="brand-dot dot-fg"></div>
        <span>FlexiGlo</span>
        <small>MY</small>
      </div>
      <div class="brand-tab" data-brand="Oxy MY" onclick="selectBrand('Oxy MY', this)">
        <div class="brand-dot dot-omy"></div>
        <span>Oxy 🇲🇾</span>
        <small>Malaysia</small>
      </div>
      <div class="brand-tab" data-brand="Oxy SG" onclick="selectBrand('Oxy SG', this)">
        <div class="brand-dot dot-osg"></div>
        <span>Oxy 🇸🇬</span>
        <small>Singapore</small>
      </div>
    </div>
  </div>

  <form id="orderForm" onsubmit="submitForm(event)">
    <input type="hidden" id="brand" name="brand" required>

    <!-- Section 1: Basic Info (always visible after brand selected) -->
    <div id="section-basic" class="brand-section-content">

      <!-- Order Info -->
      <div class="card">
        <div class="card-title">Order Details</div>
        <div class="field-grid col2">
          <div class="field" style="display:none">
            <label>Order Date</label>
            <input type="date" id="orderDate">
          </div>
          <div class="field">
            <label>Order Name <span class="req">*</span></label>
            <div class="search-wrap">
              <div class="search-input-row">
                <input type="text" id="orderName" placeholder="e.g. Tan Mei Mei / 0123456789" required autocomplete="off" oninput="searchCustomer(this.value, 'name')">
                <button type="button" class="search-toggle" id="searchModeBtn" onclick="toggleSearchMode()">📞 Phone</button>
              </div>
              <div class="search-dropdown" id="searchDropdown"></div>
            </div>
          </div>
          <div class="field">
            <label>Channel <span class="req">*</span></label>
            <select id="channel" required>
              <option value="" disabled selected>Select channel</option>
              <option>Facebook</option>
              <option>WhatsApp</option>
              <option>Shopee</option>
              <option>Instagram</option>
              <option>Lazada</option>
              <option>TikTok</option>
              <option>XHS</option>
              <option>Website</option>
              <option>Aftersales</option>
              <option>Staff</option>
              <option>Phone</option>
              <option>Sample</option>
            </select>
          </div>
          <div class="field">
            <label>Customer Type <span class="req">*</span></label>
            <select id="custType" required>
              <option value="" disabled selected>Select type</option>
              <option>NEW</option>
              <option>REPEAT</option>
              <option>PROMO NEW</option>
              <option>PROMO REPEAT</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Recipient -->
      <div class="card">
        <div class="card-title">Recipient Info</div>
        <div class="field-grid col2">
          <div class="field">
            <label>Recipient Name <span class="req">*</span></label>
            <input type="text" id="recipient" placeholder="Full name" required>
          </div>
          <div class="field">
            <label>Contact Number <span class="req">*</span></label>
            <input type="tel" id="contact" placeholder="01X-XXXXXXX" required>
          </div>
        </div>
        <div class="field-grid" style="margin-top:14px">
          <div class="field">
            <label>Address <span class="req">*</span></label>
            <textarea id="address" placeholder="Full delivery address" required></textarea>
          </div>
        </div>
        <div class="field-grid col3" style="margin-top:14px">
          <div class="field">
            <label>Postcode <span class="req">*</span></label>
            <input type="text" id="postcode" placeholder="XXXXX" maxlength="10" required onchange="autoFillStateRegion(this.value)" oninput="autoFillStateRegion(this.value)">
          </div>
          <div class="field">
            <label>State <span class="req">*</span></label>
            <select id="state" required>
              <option value="" disabled selected>State</option>
              <option>Johor</option>
              <option>Kedah</option>
              <option>Kelantan</option>
              <option>Kuala Lumpur</option>
              <option>Melaka</option>
              <option>Negeri Sembilan</option>
              <option>Pahang</option>
              <option>Penang</option>
              <option>Perak</option>
              <option>Perlis</option>
              <option>Sabah</option>
              <option>Sarawak</option>
              <option>Selangor</option>
              <option>Terengganu</option>
              <option>Singapore</option>
            </select>
          </div>
          <div class="field">
            <label>Region <span class="req">*</span></label>
            <select id="region" required>
              <option value="" disabled selected>Region</option>
              <option>WM</option>
              <option>EM</option>
              <option>SG</option>
            </select>
          </div>
        </div>
      </div>

      <!-- FlexiGlo Products -->
      <div id="section-fg" class="brand-section-content">
        <div class="card">
          <div class="card-title">FlexiGlo Products</div>
          <div class="field-grid">
            <div class="field">
              <label>Product <span class="req">*</span></label>
              <select id="product">
                <option value="" disabled selected>Select product</option>
                <option>Flexiglo</option>
                <option>Nutrieye</option>
                <option>Protigrainz</option>
              </select>
            </div>
          </div>
          <div class="field-grid col2" style="margin-top:14px">
            <div class="field">
              <label>Box (Qty)</label>

// ── Qty buttons ──
function adjustQty(id, delta) {
  const el = document.getElementById(id);

// ── File handling ──
function handleFile(file) {
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    showToast("error", "❌", "File too large. Max 10MB.");
    return;
  }
  selectedFile = file;
  const preview = document.getElementById("filePreview");
  document.getElementById("fileName").textContent = file.name;
  document.getElementById("fileSize").textContent = formatSize(file.size);
  document.getElementById("fileIcon").textContent = file.type.startsWith("image/") ? "🖼️" : "📄";
  preview.classList.add("show");
}

function removeFile() {
  selectedFile = null;
  document.getElementById("fileInput").value = "";
  document.getElementById("filePreview").classList.remove("show");
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}

// ── Drag & drop ──
const zone = document.getElementById("uploadZone");
zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("dragover"); });
zone.addEventListener("dragleave", () => zone.classList.remove("dragover"));
zone.addEventListener("drop", e => {
  e.preventDefault();
  zone.classList.remove("dragover");
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

// ── Compress image then convert to base64 ──
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    // Only compress images, pass PDF directly
    if (!file.type.startsWith("image/")) {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
      return;
    }

    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      // Max 1200px width/height, quality 0.7
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      const b64 = canvas.toDataURL("image/jpeg", 0.7).split(",")[1];
      resolve(b64);
    };
    img.onerror = reject;
    img.src = url;
  });
}

// ── Progress ──
function setProgress(pct) {

  t.className = "toast " + type + " show";
  setTimeout(() => t.classList.remove("show"), 4000);

// ── Submit ──
async function submitForm(e) {
  e.preventDefault();

  if (!selectedBrand) {
    showToast("error", "⚠️", "Please select a brand first.");
    return;
  }

  const btn = document.getElementById("submitBtn");
  const progBar = document.getElementById("progressBar");
  btn.disabled = true;
  document.getElementById("submitText").textContent = "Uploading…";
  document.getElementById("submitIcon").textContent = "⏳";
  progBar.classList.add("show");
  setProgress(20);

  // Build payload
  const payload = {
    brand:       selectedBrand,
    orderName:   document.getElementById("orderName").value,
    recipient:   document.getElementById("recipient").value,
    contact:     document.getElementById("contact").value,
    address:     document.getElementById("address").value,
    postcode:    document.getElementById("postcode").value,
    state:       document.getElementById("state").value,
    region:      document.getElementById("region").value,
    channel:     document.getElementById("channel").value,
    payMethod:   document.getElementById("payMethod").value,
    custType:    document.getElementById("custType").value,
    totalPaid:   document.getElementById("totalPaid").value,
    totalPaidSGD:document.getElementById("totalPaidSGD").value,
    delRemark:   document.getElementById("delRemark").value,
    ordRemark:   document.getElementById("ordRemark").value,
    // brand-specific
    product:     document.getElementById("product")?.value    || "",
    boxQty:      document.getElementById("boxQty")?.value     || "0",
    sachet:      document.getElementById("sachet")?.value     || "0",
    oxyTin:      document.getElementById("oxyTin")?.value     || "0",
    oxyPack:     document.getElementById("oxyPack")?.value    || "0",
    oxyBox:      document.getElementById("oxyBox")?.value     || "0",
    oxySachets:  document.getElementById("oxySachets")?.value || "0",
    otherProd:   document.getElementById("otherProd")?.value  || "",
    otherRemark: document.getElementById("otherRemark")?.value|| "",
  };

  // Attachment
  if (selectedFile) {
    setProgress(40);
    document.getElementById("submitText").textContent = "Uploading attachment…";
    try {
      const b64 = await fileToBase64(selectedFile);
      payload.attachment = {
        name: selectedFile.name,
        type: selectedFile.type,
        data: b64
      };
    } catch {
      showToast("error", "❌", "Failed to read file.");
      resetBtn();
      return;
    }
  }

  setProgress(65);
  document.getElementById("submitText").textContent = "Saving to sheet…";

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    setProgress(100);

    if (json.success) {
      showToast("success", "✅", "Order submitted successfully!");
      document.getElementById("orderForm").reset();
      removeFile();
      // Reset brand UI
      selectedBrand = "";
      document.getElementById("brand").value = "";
      document.querySelectorAll(".brand-tab").forEach(t => t.className = "brand-tab");
      document.getElementById("section-basic").classList.remove("visible");
      // Reset qty fields
      ["boxQty","sachet","oxyTin","oxyPack","oxyBox","oxySachets"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "0";
      });
    } else {
      showToast("error", "❌", json.message || "Submission failed.");
    }
  } catch (err) {
    showToast("error", "❌", "Network error. Please try again.");
  }

  resetBtn();
}

function resetBtn() {
  const btn = document.getElementById("submitBtn");
  btn.disabled = false;
  document.getElementById("submitText").textContent = "Submit Order";
  document.getElementById("submitIcon").textContent = "📤";

let CUSTOMER_LIST = [];
let searchMode = 'name'; // 'name' or 'phone'
let customersLoaded = false;

async function loadCustomers() {
  if (customersLoaded) return;
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=customers');
    const json = await res.json();
    if (json.success) {
      CUSTOMER_LIST = json.customers || [];
      customersLoaded = true;
      console.log('Loaded', CUSTOMER_LIST.length, 'repeat customers');
    }
  } catch(e) {
    console.log('Customer load failed:', e);
  }
}

function toggleSearchMode() {
  searchMode = searchMode === 'name' ? 'phone' : 'name';
  const btn = document.getElementById('searchModeBtn');
  const input = document.getElementById('orderName');
  if (searchMode === 'phone') {
    btn.textContent = '👤 Name';
    input.placeholder = 'Search by phone number...';
  } else {
    btn.textContent = '📞 Phone';
    input.placeholder = 'e.g. Tan Mei Mei / 0123456789';
  }
  document.getElementById('searchDropdown').classList.remove('show');
}

function searchCustomer(query, mode) {
  const dropdown = document.getElementById('searchDropdown');
  if (!query || query.length < 2) {
    dropdown.classList.remove('show');
    return;
  }

  // Only search if REPEAT or PROMO REPEAT selected
  const custType = document.getElementById('custType').value;
  if (custType !== 'REPEAT' && custType !== 'PROMO REPEAT') {
    dropdown.classList.remove('show');
    return;
  }

  if (!customersLoaded) {
    dropdown.innerHTML = '<div class="search-loading">⏳ Loading customers...</div>';
    dropdown.classList.add('show');
    loadCustomers().then(() => searchCustomer(query, mode));
    return;
  }

  const q = query.toLowerCase().replace(/\D/g, searchMode === 'phone' ? '' : undefined).trim();
  
  let results;
  if (searchMode === 'phone') {
    const qDigits = query.replace(/\D/g, '');
    results = CUSTOMER_LIST.filter(c => 
      c.contact && c.contact.replace(/\D/g, '').includes(qDigits)
    );
  } else {
    results = CUSTOMER_LIST.filter(c =>
      (c.orderName && c.orderName.toLowerCase().includes(query.toLowerCase())) ||
      (c.recipient && c.recipient.toLowerCase().includes(query.toLowerCase()))
    );
  }

  results = results.slice(0, 8); // max 8 results

  if (results.length === 0) {
    dropdown.innerHTML = '<div class="search-hint">No matching customers found</div>';
    dropdown.classList.add('show');
    return;
  }

  dropdown.innerHTML = results.map((c, i) => `
    <div class="search-item" onclick="selectCustomer(${i})">
      <div class="search-item-name">${c.orderName || c.recipient}</div>
      <div class="search-item-detail">${c.contact || '—'} · ${c.state || '—'}</div>
    </div>
  `).join('');
  
  // Store results temporarily for selection
  window._searchResults = results;
  dropdown.classList.add('show');
}

function selectCustomer(idx) {
  const c = window._searchResults[idx];
  if (!c) return;

  // Auto-fill all fields
  document.getElementById('orderName').value  = c.orderName || '';
  document.getElementById('recipient').value  = c.recipient || c.orderName || '';
  document.getElementById('contact').value    = c.contact   || '';
  document.getElementById('address').value    = c.address   || '';
  document.getElementById('postcode').value   = c.postcode  || '';
  if (c.state)   document.getElementById('state').value  = c.state;
  if (c.region)  document.getElementById('region').value = c.region;

  document.getElementById('searchDropdown').classList.remove('show');
}

function lookupPostcode(pc) {
  const cleaned = String(pc).replace(/\D/g, '').padStart(5, '0');
  if (cleaned.length < 5) return null;

  // Singapore: 6-digit postcode
  if (cleaned.length === 6 || (cleaned.length >= 5 && parseInt(cleaned) < 10000 && selectedBrand === 'Oxy SG')) {
    return { state: 'Singapore', region: 'SG' };
  }

  const prefix = cleaned.substring(0, 2);
  return PREFIX_MAP[prefix] || null;
}

document.getElementById('postcode').addEventListener('input', function() {
  const pc = this.value.trim();
  
  // Singapore brand: always SG
  if (selectedBrand === 'Oxy SG') {
    document.getElementById('state').value  = 'Singapore';
    document.getElementById('region').value = 'SG';
    return;
  }

  if (pc.length >= 4) {
    const result = lookupPostcode(pc);
    if (result) {
      document.getElementById('state').value  = result.state;
      document.getElementById('region').value = result.region;
    }
  }
});
